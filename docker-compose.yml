version: "3.9"

services:
  redis:
    image: redis:7.2
    container_name: redis_server
    command: ["redis-server", "--appendonly", "yes"] 
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  neo4j:
    image: neo4j:5.18
    container_name: neo4j_server
    ports:
      - "7474:7474"   
      - "7687:7687"  
    environment:
      - NEO4J_AUTH=neo4j/tiendat1102    
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_dbms_memory_heap_initial__size=1G
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_PLUGINS=["apoc"]           
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    restart: always

volumes:
  redis_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
