version: "3.9"

services:
  fastapi:
    build: ./fastapi_app
    container_name: fastapi
    ports:
      - "8000:8000"
    restart: unless-stopped

  express:
    build: ./express_app
    container_name: express
    ports:
      - "5000:5000"
    restart: unless-stopped

  react:
    build: ./react_app
    container_name: react
    ports:
      - "3000:3000"
    restart: unless-stopped
